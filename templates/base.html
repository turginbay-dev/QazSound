{% load static %}
<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE|default:'kk' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}QazSound{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components.css' %}" />
    <link rel="stylesheet" href="{% static 'css/pages.css' %}" />
  </head>
  <body>
    <div class="app-bg-overlay" aria-hidden="true"></div>
    {% include 'includes/navbar.html' %}

    <main class="container page-shell">
      {% include 'includes/messages.html' %}
      {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}
    {% include 'includes/playerbar.html' %}

    <script src="{% static 'js/main.js' %}" defer></script>
    <script src="{% static 'js/navigation.js' %}" defer></script>
    <script src="{% static 'js/forms.js' %}?v=20260328-2" defer></script>
    <script src="{% static 'js/likes.js' %}" defer></script>
    <script src="{% static 'js/player.js' %}?v=20260329-mediafix" defer></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
